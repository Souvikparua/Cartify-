<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){var _f=window.fetch;window.fetch=function(u,o){try{o=o||{};var t=localStorage.getItem("cartify_token");if(t&&typeof u==="string"&&u.indexOf("/api/")===0){o.headers=Object.assign({},o.headers,{Authorization:"Bearer "+t});}}catch(e){}return _f.call(this,u,o);};})();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartify — Delivery Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{ --green:#3bb77e;--green-d:#29a56c;--green-soft:#e6f7ef;--sidebar:#1e293b;--line:#e5e7eb;--dark:#1f2937;--muted:#6b7280;--bg:#f3f4f6;--card:#fff;--pink:#ef4767;--amber:#f59e0b;--blue:#3b82f6;--shadow:0 6px 24px rgba(0,0,0,.07);}
    *{box-sizing:border-box;} body{margin:0;font-family:"Quicksand",system-ui,sans-serif;background:var(--bg);color:var(--dark);}
    a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;} input,select{font-family:inherit;}
    .app{display:flex;min-height:100vh;} .sidebar{width:230px;background:var(--sidebar);color:#cbd5e1;flex-shrink:0;position:sticky;top:0;height:100vh;}
    .sb-brand{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);}
    .sb-user{padding:14px 20px;font-size:13px;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.08);}
    .nav-item{display:flex;align-items:center;gap:11px;padding:11px 20px;color:#cbd5e1;font-size:14px;font-weight:600;cursor:pointer;}
    .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;} .nav-item.active{background:var(--green);color:#fff;}
    .main{flex:1;min-width:0;} .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
    .topbar h1{font-size:19px;margin:0;} .sp{margin-left:auto;}
    .btn{padding:9px 15px;border-radius:9px;font-weight:600;font-size:14px;background:#eef1f5;color:var(--dark);} .btn:hover{background:#e3e7ec;}
    .btn-green{background:var(--green);color:#fff;} .btn-green:hover{background:var(--green-d);}
    .toggle{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:13px;padding:7px 12px;border-radius:999px;cursor:pointer;}
    .toggle.on{background:var(--green-soft);color:var(--green-d);} .toggle.off{background:#fde2e8;color:#be123c;}
    .content{padding:24px;} .section{display:none;} .section.active{display:block;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:20px;}
    .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;box-shadow:var(--shadow);}
    .stat .v{font-size:26px;font-weight:800;} .stat .l{color:var(--muted);font-size:13px;font-weight:600;}
    .order{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
    .order .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;} .order .id{font-weight:700;}
    .order .addr{color:var(--muted);font-size:13px;} .order .items{font-size:12px;color:var(--muted);margin-top:4px;}
    .order .acts{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
    .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
    .b-amber{background:#fef3c7;color:#b45309;}.b-blue{background:#dbeafe;color:#1d4ed8;}.b-green{background:var(--green-soft);color:var(--green-d);}.b-gray{background:#eef1f5;color:#475569;}
    .field{margin-bottom:13px;} .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:600;} .field input,.field select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);outline:none;}
    .submit{padding:11px 20px;border-radius:9px;background:var(--green);color:#fff;font-weight:700;} .empty{text-align:center;color:var(--muted);padding:30px;}
    .gate{max-width:460px;margin:80px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px;box-shadow:var(--shadow);}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 22px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .25s;z-index:300;font-weight:600;font-size:14px;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
  <div class="gate" id="gate" style="display:none">
    <h2>🚛 Delivery partner access required</h2>
    <p id="gateMsg" style="color:var(--muted)">Please sign in with a delivery partner account.</p>
    <a class="btn btn-green" href="/" style="margin-top:14px;display:inline-block">Go to store &amp; sign in</a>
  </div>

  <div class="app" id="app" style="display:none">
    <aside class="sidebar">
      <div class="sb-brand">🚛 Delivery Partner</div>
      <div class="sb-user" id="sbUser"></div>
      <div class="nav-item active" data-s="assigned">📦 Assigned Orders</div>
      <div class="nav-item" data-s="available">🔔 Available Pickups</div>
      <div class="nav-item" data-s="earnings">💰 Earnings</div>
      <div class="nav-item" data-s="profile">👤 Profile</div>
    </aside>
    <div class="main">
      <div class="topbar"><h1 id="pageTitle">Assigned Orders</h1><div class="sp"></div>
        <span class="toggle off" id="availToggle">● Offline</span>
        <button class="btn" id="logoutBtn">Logout</button></div>
      <div class="content">
        <div class="section active" id="sec-assigned"><div id="assignedList"></div></div>
        <div class="section" id="sec-available"><div class="card"><h2 style="margin:0 0 6px">Orders ready for pickup</h2><div style="color:var(--muted);font-size:13px;margin-bottom:10px">Claim an order to add it to your route.</div><div id="availList"></div></div></div>
        <div class="section" id="sec-earnings"><div id="earnBody"></div></div>
        <div class="section" id="sec-profile"><div class="card" style="max-width:480px"><h2>My Profile</h2>
          <form id="profileForm"><div class="field"><label>Name</label><input name="name" /></div>
          <div class="field"><label>Vehicle</label><select name="vehicleType"><option>Bike</option><option>Scooter</option><option>Car</option><option>Van</option><option>Bicycle</option></select></div>
          <button type="submit" class="submit">Save Profile</button></form></div></div>
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <script>
    const ORDERS_API="/api/orders", DELIVERY_API="/api/delivery";
    const FLAT_FEE=2; // base earning per delivery when shipping was free
    const user=JSON.parse(localStorage.getItem("cartify_user")||"null");
    const $=(id)=>document.getElementById(id);
    let toastTimer; function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400);}
    const money=(n)=>"$"+Number(n||0).toFixed(2);
    const statusBadge=(s)=>{const m={ReadyForPickup:"b-amber",PickedUp:"b-blue",Delivered:"b-green"};return `<span class="badge ${m[s]||"b-gray"}">${s}</span>`;};
    const fee=(o)=>Math.max(Number(o.deliveryCharge||0),FLAT_FEE);
    const addrText=(a)=>a?[a.line1,a.city,a.state,a.zip].filter(Boolean).join(", "):"";
    const mapsUrl=(a)=>`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addrText(a)||"")}`;

    if(!user || user.role!=="DeliveryPartner"){ $("gate").style.display="block"; if(user)$("gateMsg").textContent=`Signed in as ${user.email} (${user.role}). Not a delivery partner.`; }
    else { $("app").style.display="flex"; $("sbUser").textContent=user.email; init(); }
    $("logoutBtn").onclick=()=>{localStorage.removeItem("cartify_user");localStorage.removeItem("cartify_token");location.href="/";};

    let me={};
    async function jget(u){const r=await fetch(u);if(!r.ok)throw new Error();return r.json();}
    async function loadMe(){ try{me=await jget(`${DELIVERY_API}/${encodeURIComponent(user.email)}`);}catch{me={email:user.email,isAvailable:false};} renderToggle(); }
    function renderToggle(){ const on=!!me.isAvailable; $("availToggle").className="toggle "+(on?"on":"off"); $("availToggle").textContent=on?"● Online":"● Offline"; }

    function init(){
      document.querySelectorAll(".nav-item").forEach(n=>n.onclick=()=>show(n.dataset.s));
      $("availToggle").onclick=toggleAvail;
      $("profileForm").onsubmit=saveProfile;
      document.addEventListener("click",onAction);
      loadMe().then(()=>show("assigned"));
    }
    function show(s){
      document.querySelectorAll(".section").forEach(x=>x.classList.toggle("active",x.id==="sec-"+s));
      document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.s===s));
      $("pageTitle").textContent=({assigned:"Assigned Orders",available:"Available Pickups",earnings:"Earnings",profile:"Profile"})[s];
      ({assigned:renderAssigned,available:renderAvailable,earnings:renderEarnings,profile:renderProfile}[s]||(()=>{}))();
    }

    const mine=()=>jget(`${ORDERS_API}/partner/${encodeURIComponent(user.email)}`).catch(()=>[]);
    const pool=()=>jget(ORDERS_API).catch(()=>[]);

    async function toggleAvail(){ const on=!me.isAvailable; try{ await fetch(`${DELIVERY_API}/${encodeURIComponent(user.email)}/availability`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(on)}); me.isAvailable=on; renderToggle(); toast(on?"You are online":"You are offline"); }catch{toast("Failed");} }

    function orderCard(o,acts){ return `<div class="order"><div class="top"><span class="id">Order #${o.id}</span>${statusBadge(o.status)}<span style="margin-left:auto;font-weight:700;color:var(--green-d)">${money(fee(o))} fee</span></div>
      <div class="addr">📍 ${o.customerName} — ${addrText(o.shippingAddress)||"no address"}</div>
      <div class="items">${(o.items||[]).map(i=>i.name+"×"+i.quantity).join(", ")}</div>
      <div class="acts">${acts}</div></div>`; }

    async function renderAssigned(){
      const os=(await mine()).filter(o=>o.status!=="Delivered");
      $("assignedList").innerHTML=os.length?os.map(o=>orderCard(o,`
        <a class="btn" href="${mapsUrl(o.shippingAddress)}" target="_blank">🧭 Navigate</a>
        ${o.status==="ReadyForPickup"?`<button class="btn btn-green" data-pickup="${o.id}">Confirm Pickup</button>`:""}
        ${o.status==="PickedUp"?`<button class="btn btn-green" data-deliver="${o.id}">Confirm Delivery</button>`:""}`)).join(""):`<div class="empty">No active deliveries. Grab one from Available Pickups.</div>`;
    }
    async function renderAvailable(){
      const os=(await pool()).filter(o=>o.status==="ReadyForPickup" && !o.deliveryPartnerEmail);
      $("availList").innerHTML=os.length?os.map(o=>orderCard(o,`<a class="btn" href="${mapsUrl(o.shippingAddress)}" target="_blank">🧭 Preview route</a><button class="btn btn-green" data-claim="${o.id}">Claim</button>`)).join(""):`<div class="empty">No pickups available right now.</div>`;
    }
    async function renderEarnings(){
      const done=(await mine()).filter(o=>o.status==="Delivered"); const total=done.reduce((s,o)=>s+fee(o),0);
      $("earnBody").innerHTML=`<div class="stats"><div class="stat"><div class="v">${money(total)}</div><div class="l">Total earnings</div></div><div class="stat"><div class="v">${done.length}</div><div class="l">Deliveries done</div></div><div class="stat"><div class="v">${money(done.length?total/done.length:0)}</div><div class="l">Avg per delivery</div></div></div>
        <div class="card"><h2 style="margin:0 0 12px">Delivery earnings</h2>${done.length?`<table style="width:100%;border-collapse:collapse"><thead><tr><th style="text-align:left;padding:8px;color:var(--muted);font-size:12px">ORDER</th><th style="text-align:left;padding:8px;color:var(--muted);font-size:12px">CUSTOMER</th><th style="text-align:right;padding:8px;color:var(--muted);font-size:12px">FEE</th></tr></thead><tbody>${done.map(o=>`<tr><td style="padding:8px;border-top:1px solid var(--line)">#${o.id}</td><td style="padding:8px;border-top:1px solid var(--line)">${o.customerName}</td><td style="padding:8px;border-top:1px solid var(--line);text-align:right">${money(fee(o))}</td></tr>`).join("")}</tbody></table>`:`<div class="empty">No completed deliveries yet.</div>`}</div>`;
    }
    function renderProfile(){ $("profileForm").name.value=me.name||""; if(me.vehicleType) $("profileForm").vehicleType.value=me.vehicleType; }
    async function saveProfile(e){ e.preventDefault(); const f=e.target; try{ const r=await fetch(DELIVERY_API,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:user.email,name:f.name.value.trim(),vehicleType:f.vehicleType.value})}); if(!r.ok)throw new Error(); me=await r.json(); toast("Profile saved"); }catch{toast("Save failed");} }

    async function assign(id,body,msg,rerender){ try{const r=await fetch(`${ORDERS_API}/${id}/assign`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r.ok)throw new Error();toast(msg);rerender();}catch{toast("Failed");} }
    function onAction(e){ const t=e.target;
      const c=t.closest("[data-claim]"); if(c) assign(c.dataset.claim,{deliveryPartnerEmail:user.email},"Order claimed",renderAvailable);
      const p=t.closest("[data-pickup]"); if(p) assign(p.dataset.pickup,{status:"PickedUp"},"Pickup confirmed",renderAssigned);
      const d=t.closest("[data-deliver]"); if(d) assign(d.dataset.deliver,{status:"Delivered"},"Delivered! 🎉",renderAssigned);
    }
  </script>
</body>
</html>
